#
# Senior Project - GPS + NB-IoT on SparkFun Thing Plus nRF9160
# Board target: sparkfun_thing_plus_nrf9160_ns
#
# Build command:
#   west build -b sparkfun_thing_plus_nrf9160_ns -- -DCONF_FILE=prj.conf
#
# SPDX-License-Identifier: LicenseRef-Nordic-5-Clause
#

# ===========================================================================
# MODEM
# ===========================================================================
CONFIG_NRF_MODEM_LIB=y
CONFIG_FPU=y

# ===========================================================================
# LTE / NB-IoT
# ===========================================================================
CONFIG_LTE_LINK_CONTROL=y

# Network mode: NB-IoT + GPS  (change to LTE_NETWORK_MODE_LTE_M_GPS for LTE-M)
CONFIG_LTE_NETWORK_MODE_NBIOT_GPS=y

# Power Saving Mode (PSM) — keeps modem in low-power sleep between transmissions
CONFIG_LTE_LC_PSM_MODULE=y
CONFIG_LTE_PSM_REQ=y
CONFIG_LTE_PSM_REQ_RPTAU="00101000"    # Periodic TAU: 8 hours
CONFIG_LTE_PSM_REQ_RAT="00000011"      # Active time: 6 seconds

# ===========================================================================
# GNSS / GPS
# ===========================================================================
# Assistance mode: choose ONE of the three options below.
#
# Option A (default): No assistance — standalone GPS cold start
CONFIG_GNSS_SAMPLE_ASSISTANCE_NONE=y

# Option B: Minimal assistance — uses factory almanac + LTE time + MCC location
# CONFIG_GNSS_SAMPLE_ASSISTANCE_MINIMAL=y

# Option C: nRF Cloud A-GNSS (requires nRF Cloud account + SIM with data plan)
# CONFIG_GNSS_SAMPLE_ASSISTANCE_NRF_CLOUD=y
# CONFIG_NRF_CLOUD=y

# GNSS operation mode: choose ONE
CONFIG_GNSS_SAMPLE_MODE_CONTINUOUS=y    # Track continuously
# CONFIG_GNSS_SAMPLE_MODE_PERIODIC=y   # Fix every N seconds (set interval below)
# CONFIG_GNSS_SAMPLE_MODE_TTFF_TEST=y  # Measure time-to-first-fix only

# Periodic fix interval (only used when GNSS_SAMPLE_MODE_PERIODIC=y)
# CONFIG_GNSS_SAMPLE_PERIODIC_INTERVAL=120
# CONFIG_GNSS_SAMPLE_PERIODIC_TIMEOUT=120

# ===========================================================================
# NETWORKING (required for LTE data sockets)
# ===========================================================================
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_NATIVE=n                    # Disable native stack to save RAM

# ===========================================================================
# CONSOLE / UART / LOGGING
# ===========================================================================
CONFIG_STDOUT_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_PICOLIBC_IO_FLOAT=y             # Needed to print float values (lat/lon)
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# AT command passthrough — lets nRF Connect for Desktop LTE Link Monitor connect
CONFIG_AT_HOST_LIBRARY=y

# ===========================================================================
# MEMORY
# ===========================================================================
CONFIG_HEAP_MEM_POOL_SIZE=2048
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1536
